<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Dosis:wght@200..800&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
		<script src="script.js" defer></script>
		<title>Signup Page</title>
	</head>
	<body>
		<main class="container">
			<section class="image-section">
				<div class="logo-div">
					<img
						id="site-logo"
						src="./images/odin-lined.png"
						alt="logo for my signup page"
					/>
					<p id="logo-text">Surge Ltd.</p>
				</div>
			</section>
			<section class="form-section">
				<div class="pitch-text-div">
					<p class="pitch-text">
						The way to your destination will be revealed with just one click.
					</p>
					<p class="pitch-text">Wanna make that click?</p>
				</div>
				<div class="form-div">
					<form class="signup-form" action="" method="post" novalidate>
						<div class="fields">
							<div class="input-div">
								<label for="first-name">First Name</label>
								<input
									type="text"
									name="first-name"
									id="first-name"
									maxlength="24"
									required
								/>
								<p class="error-message"></p>
							</div>
							<div class="input-div">
								<label for="last-name">Last Name</label>
								<input
									type="text"
									name="last-name"
									id="last-name"
									maxlength="24"
									required
								/>
								<p class="error-message"></p>
							</div>
							<div class="input-div">
								<label for="email">Email</label>
								<input
									type="email"
									name="email"
									id="email"
									placeholder="name@example.com"
									required
								/>
								<p class="error-message"></p>
							</div>
							<div class="input-div">
								<label for="phone-number">Phone Number</label>
								<input
									type="tel"
									name="phone-number"
									id="phone-number"
									pattern="03(?=[0-9]{9})[0-9]{9}|[+]923(?=[0-9]{9})[0-9]{9}"
									required
								/>
								<p class="error-message"></p>
							</div>
							<div class="input-div">
								<label for="password">Password</label>
								<input
									type="password"
									name="password"
									id="password"
									minlength="8"
									required
								/>
								<p class="error-message"></p>
							</div>
							<div class="input-div">
								<label for="confirm-password">Confirm Password</label>
								<input
									type="password"
									name="confirm-password"
									id="confirm-password"
									minlength="8"
									required
								/>
								<p class="error-message"></p>
							</div>
						</div>
						<div class="button-and-link">
							<button id="create-account-btn">Create Account</button>
							<div class="login-link-div">
								<p>
									Already have an account?
									<a id="login-link" href="#">Log in</a>
								</p>
							</div>
						</div>
						<div class="github-link">
							<svg
								xmlns="http://www.w3.org/2000/svg"
								x="0px"
								y="0px"
								width="30"
								height="30"
								viewBox="0 0 30 30"
							>
								<path
									d="M15,3C8.373,3,3,8.373,3,15c0,5.623,3.872,10.328,9.092,11.63C12.036,26.468,12,26.28,12,26.047v-2.051 c-0.487,0-1.303,0-1.508,0c-0.821,0-1.551-0.353-1.905-1.009c-0.393-0.729-0.461-1.844-1.435-2.526 c-0.289-0.227-0.069-0.486,0.264-0.451c0.615,0.174,1.125,0.596,1.605,1.222c0.478,0.627,0.703,0.769,1.596,0.769 c0.433,0,1.081-0.025,1.691-0.121c0.328-0.833,0.895-1.6,1.588-1.962c-3.996-0.411-5.903-2.399-5.903-5.098 c0-1.162,0.495-2.286,1.336-3.233C9.053,10.647,8.706,8.73,9.435,8c1.798,0,2.885,1.166,3.146,1.481C13.477,9.174,14.461,9,15.495,9 c1.036,0,2.024,0.174,2.922,0.483C18.675,9.17,19.763,8,21.565,8c0.732,0.731,0.381,2.656,0.102,3.594 c0.836,0.945,1.328,2.066,1.328,3.226c0,2.697-1.904,4.684-5.894,5.097C18.199,20.49,19,22.1,19,23.313v2.734 c0,0.104-0.023,0.179-0.035,0.268C23.641,24.676,27,20.236,27,15C27,8.373,21.627,3,15,3z"
								></path>
							</svg>
							<p><a target="_blank" href="https://github.com/adilafsar99">Muhammad Adil</a></p>
						</div>
					</form>
				</div>
			</section>
		</main>
	</body>
</html>
