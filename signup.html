<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page</title>
</head>
<body>
    <main class="container">
        <section class="image-section">
           <div class="image-div">
              <img id="background-image" src="" alt="background image for my signup page">
           </div>
        </section>
        <section class="form-section">
           <div class="pitch-text-div">
             <p class="pitch-text">
               Here to signup for my website.
             </p>
             <p class="pitch-text">
               <em>Right?</em>
             </p>
           </div>
           <div class="form-div">
              <form action="" method="post">
                <div class="input-div">
                   <label for="first-name">First Name</label>
                   <input type="text" name="first-name" id="first-name" required>
                </div>
                <div class="input-div">
                   <label for="last-name">Last Name</label>
                   <input type="text" name="last-name" id="last-name" required>
                </div>
                <div class="input-div">
                   <label for="email">Email</label>
                   <input type="email" name="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="input-div">
                   <label for="phone-number">Phone Number</label>
                   <input type="tel" name="phone-number" id="phone-number" required>
                </div>
                <div class="input-div">
                   <label for="password">Password</label>
                   <input type="password" name="password" id="password" required>
                </div>
                <div class="input-div">
                   <label for="confirm-password">Confirm Password</label>
                   <input type="password" name="confirm-password" id="confirm-password" required>
                </div>
                <button id="create-account-btn">
                  Create Account
                </button>
                <div class="login-link-div">
                  <p class="login-link">
                    Already have an account? <a href="#">Log in</a>
                  </p>
                </div>
              </form>
           </div>
        </section>
    </main>
</body>
</html>
